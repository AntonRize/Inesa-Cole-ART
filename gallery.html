<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Browse and purchase original textured paintings by Inesa Cole. Oil and acrylic artworks available for sale.">
    <title>Gallery - Inesa Cole ART</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.4/css/lightbox.min.css">
</head>
<body>

    <header>
        <h1><a href="index.html">Inesa Cole ART</a></h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="gallery.html" class="active">Gallery</a>
            <a href="bio.html">Bio</a>
        </nav>
    </header>

    <main>
        <h2>Gallery</h2>
        <p class="page-subtitle">Browse the collection of original paintings. Click any image for a closer look.</p>

        <!-- Filter Controls -->
        <div class="gallery-controls">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="available">Available</button>
            <button class="filter-btn" data-filter="sold">Sold</button>
        </div>

        <!-- Gallery Grid (dynamically populated) -->
        <div class="gallery-grid" id="gallery-grid">
            <div class="gallery-loading">Loading paintings...</div>
        </div>
    </main>

    <footer>
        <p>&copy; 2025 Inesa Cole. All rights reserved.</p>
        <p><a href="index.html">Home</a> &middot; <a href="bio.html">Bio</a></p>
    </footer>

    <!-- Lightbox2 library for image zoom -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.4/js/lightbox.min.js"></script>

    <!-- Site scripts -->
    <script src="js/main.js"></script>
    <script src="js/gallery.js"></script>

</body>
</html>
